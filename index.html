<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- MERKEZİ FAVICON ENTEGRASYONU -->
    <link rel="icon" type="image/svg+xml" href="https://sentiric.github.io/sentiric-assets/image/favicon.svg">
    <link rel="alternate icon" type="image/png" href="https://sentiric.github.io/sentiric-assets/image/favicon.png">

    <title>🌊 Sentiric Stream SDK Demo</title>
    
    <style>
        body { font-family: sans-serif; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
        /* Logo görseli için küçük bir stil */
        .logo { width: 80px; margin-bottom: 1rem; }
    </style>
  <script type="module" crossorigin src="./stream-sdk.umd.js"></script>
</head>
<body>

    <div class="card">
        <!-- Opsiyonel: Sayfa içine de merkezi logoyu basalım -->
        <img src="https://sentiric.github.io/sentiric-assets/image/sentiric-logo.svg" alt="Sentiric Logo" class="logo">
        
        <h1>Sentiric Stream SDK</h1>
        <p id="status">Hazır. Konuşmak için butona tıkla.</p>

        <div style="margin-top: 1rem; font-size: 0.8rem; color: #94a3b8;">
            <span id="app-version">...</span>
        </div>        
    </div>


    <!-- SDK Entegrasyonu (Modül olarak) -->

    <!-- Widget Kullanımı -->
    <sentiric-voice-widget 
        id="myWidget"
        tenant-id="demo-tenant" 
        theme-color="#10b981"
        language="tr-TR">
    </sentiric-voice-widget>

    <!-- DÜZELTME: type="module" eklendi -->

</body>
</html>
