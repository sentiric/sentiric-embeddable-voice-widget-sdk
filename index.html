<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 Sentiric SDK Demo</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #1e293b;
            text-align: center;
        }
        h1 { margin-bottom: 10px; }
        p { color: #64748b; max-width: 400px; line-height: 1.5; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Sentiric Voice AI</h1>
        <p>Konuşmaya başlamak için aşağıdaki ikona tıklayın.</p>
        <small>Mimar: Sentiric Architecture Team</small>
    </div>

    <!-- SDK Entegrasyonu (Vite Dev Mode) -->
    <script type="module" src="/src/index.ts"></script>

    <!-- Widget Kullanımı -->
    <sentiric-voice-widget 
        tenant-id="demo-tenant" 
        gateway-url="ws://localhost:18030/ws"
        theme-color="#10b981"
        language="tr-TR">
    </sentiric-voice-widget>

</body>
</html>
