<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast Megaphone | Sentiric OS</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #1e1b4b; color: white; margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; min-height: 100vh;}
        .back-link { position: absolute; top: 1rem; left: 1rem; text-decoration: none; color: #a5b4fc; font-weight: 600; }
        .megaphone-box { background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 500px; margin-top: 2rem; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 100px; background: rgba(0,0,0,0.5); color: white; border: 1px solid #4f46e5; border-radius: 0.5rem; padding: 1rem; font-size: 1rem; resize: none; margin-bottom: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 1rem; background: #4f46e5; color: white; border: none; border-radius: 0.5rem; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #4338ca; transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        .status { margin-top: 1rem; font-size: 0.8rem; color: #a5b4fc; font-family: monospace; text-align: center; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Vitrine Dön</a>
    
    <div style="text-align: center; margin-top: 2rem;">
        <h1 style="font-size: 3rem; margin: 0;">📢</h1>
        <h2>Sadece Konuşan Mod (Broadcast)</h2>
        <p style="color: #a5b4fc; max-width: 400px; margin: 0 auto;">Metni yazın ve fırlatın. Sistem STT ve LLM katmanlarını es geçer, saniyenin onda biri sürede size sinema kalitesinde sesi geri akıtır.</p>
    </div>

    <div class="megaphone-box">
        <textarea id="msgInput" placeholder="Dikkat dikkat! Bu bir deneme anonsudur..."></textarea>
        <button id="sendBtn">CANLI ANONSU BAŞLAT</button>
        <div id="status" class="status">Bağlantı Bekleniyor...</div>
    </div>

    <script type="module">
        import { SentiricStreamClient } from '/src/index.ts';
        
        let client = null;
        const btn = document.getElementById('sendBtn');
        const input = document.getElementById('msgInput');
        const status = document.getElementById('status');

        async function initMegaphone() {
            client = new SentiricStreamClient({
                gatewayUrl: import.meta.env.VITE_GATEWAY_URL || "ws://localhost:18030/ws",
                tenantId: "demo-tenant",
                language: "tr-TR",
                speakOnlyMode: true // BÜYÜ BURADA
            });

            await client.start();
            status.innerText = "✅ Yayın Bağlantısı Hazır (WebSocket Secured)";
        }

        btn.onclick = () => {
            if (!client) return alert("Bağlantı kurulamadı.");
            const text = input.value.trim();
            if (!text) return;
            
            // Söz kesme (Eğer önceden çalan uzun bir anons varsa anında sustur)
            client.sendInterrupt();
            setTimeout(() => {
                client.sendText(text);
                status.innerText = "🔊 Anons Çalınıyor...";
                setTimeout(() => status.innerText = "✅ Yayın Bağlantısı Hazır", 2000);
            }, 50); // Interrupt ile Text arasına minik nefes payı
        };

        // Sayfa yüklenince arkaplanda bağlan
        window.onload = initMegaphone;
    </script>
</body>
</html>
