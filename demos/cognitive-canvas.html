<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Canvas v8.0 | Sentiric OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #020617; --panel: #0f172a; --border: #1e293b;
            --accent: #38bdf8; --text: #f8fafc; --muted: #64748b;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header {
            padding: 16px 24px; background: var(--panel); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .header-title { font-weight: 900; font-size: 20px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }
        .header-title span { color: var(--accent); }
        .status-dot { width: 10px; height: 10px; background: #64748b; border-radius: 50%; transition: 0.3s; }
        .status-dot.active { background: #10b981; box-shadow: 0 0 12px #10b981; animation: pulse 2s infinite; }

        /* WORKSPACE */
        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* SOL: İŞİTSEL KORTEKS (RADAR - SADECE DİNLER) */
        .sensory-pane { width: 450px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg); position: relative;}
        .pane-title { padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--panel); display: flex; justify-content: space-between; }
        
        .radar-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        .transcript-line { animation: slideIn 0.3s ease; }
        .transcript-meta { font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 6px; letter-spacing: 1px; display: flex; justify-content: space-between;}
        .transcript-text { font-size: 14px; line-height: 1.6; color: #cbd5e1; }
        .transcript-text.partial { opacity: 0.5; }

        .control-bar { padding: 24px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: center; }
        .mic-btn { width: 64px; height: 64px; border-radius: 50%; background: #1e293b; color: white; border: 1px solid #334155; font-size: 24px; cursor: pointer; transition: 0.3s; display: grid; place-items: center; }
        .mic-btn:hover { background: #334155; }
        .mic-btn.active { background: #ef4444; border-color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        /* SAĞ: BEYİN (JSON ÇIKARICI) */
        .cognitive-pane { flex: 1; background: radial-gradient(circle at top right, #0f172a 0%, #020617 100%); display: flex; flex-direction: column; }
        
        .memory-grid { padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; overflow-y: auto; align-content: flex-start; }
        
        .memory-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 24px; backdrop-filter: blur(10px); animation: fadeInUp 0.4s ease; border-left: 3px solid var(--card-color, var(--muted)); transition: 0.3s; }
        .memory-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.04); }
        
        .memory-card.importance-5 { --card-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.1); }
        .memory-card.importance-4 { --card-color: #f59e0b; }
        .memory-card.importance-3 { --card-color: #10b981; }
        .memory-card.importance-2 { --card-color: #38bdf8; }
        .memory-card.importance-1 { --card-color: #64748b; }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 10px; font-weight: 800; letter-spacing: 1px; color: var(--card-color); text-transform: uppercase; }
        .card-body { font-size: 14px; line-height: 1.6; color: #f8fafc; font-weight: 500; }
        .card-tags { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px; font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

        .extraction-loader { font-size: 11px; font-weight: 800; color: #a855f7; letter-spacing: 2px; display: flex; align-items: center; gap: 8px; opacity: 0; transition: 0.3s;}
        .extraction-loader.active { opacity: 1; }

        @keyframes pulse { 50% { opacity: 0.4; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">🧠 COGNITIVE <span>CANVAS v8.0</span> <div class="status-dot" id="statusDot"></div></div>
        <a href="../index.html" style="color:var(--muted); text-decoration:none; font-size: 12px; font-weight:600;">&larr; Çıkış</a>
    </div>

    <div class="workspace">
        <!-- SOL: SADECE KULAK (SES YOK, SADECE DİNLER) -->
        <div class="sensory-pane">
            <div class="pane-title">
                <span>RADAR (İŞİTSEL KORTEKS)</span>
                <span id="connText" style="color: var(--muted)">OFFLINE</span>
            </div>
            <div class="radar-container" id="radar">
                <div style="text-align:center; color:var(--muted); margin-top:80px; font-size:13px; line-height:1.6;">
                    Sistem ortamı pasif olarak dinler. Size ASLA sesli cevap vermez.<br><br>Siz konuşmayı bitirdiğinizde, metin sessizce "Bilişsel Çıkarıcı"ya iletilir ve sağ panele JSON anı olarak düşer.
                </div>
            </div>
            <div class="control-bar"><button class="mic-btn" id="micBtn">🎤</button></div>
        </div>

        <!-- SAĞ: BEYİN (JSON ÇIKARICI, HTTP VEYA API YOK, SADECE WEBSOCKET) -->
        <div class="cognitive-pane">
            <div class="pane-title" style="background: transparent; border-bottom: 1px solid rgba(255,255,255,0.05);">
                <span>ATOMİK HAFIZA (CANLI ÇIKARIM)</span>
                <div class="extraction-loader" id="loader">
                    <span>⚡ BEYİN İŞLİYOR...</span>
                </div>
            </div>
            <div class="memory-grid" id="memoryGrid"></div>
        </div>
    </div>

    <script type="module">
        import { SentiricStreamClient } from '/src/index.ts';

        const radar = document.getElementById('radar');
        const grid = document.getElementById('memoryGrid');
        const micBtn = document.getElementById('micBtn');
        const statusDot = document.getElementById('statusDot');
        const connText = document.getElementById('connText');
        const loader = document.getElementById('loader');
        
        let earClient = null;   // Sadece dinler
        let brainClient = null; // Sadece JSON üretir
        let isRunning = false;
        let activeTurnEl = null;

        async function toggleMode() {
            if (isRunning) {
                earClient?.stop();
                brainClient?.stop();
                micBtn.classList.remove('active');
                statusDot.classList.remove('active');
                connText.innerText = "OFFLINE";
                connText.style.color = "var(--muted)";
                isRunning = false;
                return;
            }

            radar.innerHTML = '';
            const gwUrl = import.meta.env.VITE_GATEWAY_URL || "ws://localhost:18030/ws";

            // 1. KULAK İSTEMCİSİ (Sadece Dinler, TTS Kapalı)
            earClient = new SentiricStreamClient({
                gatewayUrl: gwUrl,
                tenantId: "sentiric_demo",
                language: "tr-TR",
                listenOnlyMode: true, // Asla konuşmaz
                onTranscript: handleEarTranscript,
                onStatusUpdate: handleMoodShift
            });

            // 2. BEYİN İSTEMCİSİ (Sadece Chat, TTS Yok, Özel System Prompt ile başlar)
            brainClient = new SentiricStreamClient({
                gatewayUrl: gwUrl,
                tenantId: "sentiric_demo",
                chatOnlyMode: true, // Mikrofon ve TTS kapalı, sadece Text I/O
                systemPromptId: "PROMPT_SYSTEM_MEMORY_EXTRACTOR", // Doğrudan Extractor Promptu ile başlat!
                onTranscript: handleBrainTranscript
            });

            try {
                await brainClient.start(); // Önce beyin başlasın
                await earClient.start();   // Sonra kulak açılıp dinlesin
                
                micBtn.classList.add('active');
                statusDot.classList.add('active');
                connText.innerText = "RADAR AKTİF";
                connText.style.color = "#10b981";
                isRunning = true;
            } catch (e) {
                alert("Bağlantı Hatası: " + e.message);
            }
        }

        // KULAK DUYDUĞUNDA ÇALIŞIR
        function handleEarTranscript(data) {
            if (data.sender !== "USER") return; // Sadece kullanıcıyı göster
            
            const isFinal = data.isFinal || data.is_final;
            const text = data.text || data.text_chunk || "";

            if (!activeTurnEl) {
                const turnDiv = document.createElement('div');
                turnDiv.className = 'transcript-line';
                turnDiv.innerHTML = `
                    <div class="transcript-meta">
                        <span>🎙️ SİNYAL ALINDI</span>
                        <span style="opacity:0.7">MOD: ${data.emotion?.toUpperCase() || 'NEUTRAL'}</span>
                    </div>
                    <div class="transcript-text partial"></div>
                `;
                radar.appendChild(turnDiv);
                activeTurnEl = turnDiv;
            }

            const textEl = activeTurnEl.querySelector('.transcript-text');
            textEl.innerText = text;

            if (isFinal) {
                textEl.classList.remove('partial');
                activeTurnEl = null;

                // Kulak cümleyi bitirdi, şimdi Beyin'e yolla (Prompt formatına uygun şekilde)
                if (text.length > 5) {
                    loader.classList.add('active');
                    const brainPrompt = `KULLANICI: "${text}"\nASİSTAN: "Seni dinliyorum."`;
                    brainClient.sendText(brainPrompt);
                }
            }
            radar.scrollTop = radar.scrollHeight;
        }

        // BEYİN DÜŞÜNDÜĞÜNDE ÇALIŞIR (Bize JSON dönecek)
        function handleBrainTranscript(data) {
            if (data.sender !== "AI") return;

            const isFinal = data.isFinal || data.is_final;
            const text = data.text || data.text_chunk || "";

            if (isFinal) {
                loader.classList.remove('active');
                parseAndRenderCards(text);
            }
        }

        // BEYİNDEN GELEN JSON'U KARTLARA ÇEVİRİR
        function parseAndRenderCards(rawAiText) {
            if (rawAiText.includes("NONE") || rawAiText.length < 10) return;

            try {
                let cleanText = rawAiText.replace(/```json/g, "").replace(/```/g, "").trim();
                
                // Güvenli JSON Array Çıkarımı
                const start = cleanText.indexOf("[{");
                const end = cleanText.lastIndexOf("}]");
                if (start !== -1 && end !== -1) {
                    cleanText = cleanText.substring(start, end + 2);
                } else if (cleanText.indexOf('[') !== -1 && cleanText.lastIndexOf(']') !== -1) {
                    cleanText = cleanText.substring(cleanText.indexOf('['), cleanText.lastIndexOf(']') + 1);
                }

                const facts = JSON.parse(cleanText);
                
                facts.forEach(fact => {
                    const cardId = btoa(encodeURIComponent(fact.summary)).substring(0, 15);
                    if(document.getElementById(`mem-${cardId}`)) return; 

                    const card = document.createElement('div');
                    card.id = `mem-${cardId}`;
                    card.className = `memory-card importance-${fact.importance || 1}`;

                    const tagsHtml = (fact.metadata || []).map(t => `<span class="tag">#${t}</span>`).join('');

                    card.innerHTML = `
                        <div class="card-header">
                            <span>⬡ ${fact.category}</span>
                            <span style="opacity: 0.8">ÖNEM: ${fact.importance}/5</span>
                        </div>
                        <div class="card-body">"${fact.summary}"</div>
                        <div class="card-tags">${tagsHtml}</div>
                    `;
                    grid.prepend(card);
                });
            } catch (e) {
                console.warn("JSON Parse edilemedi, AI düz metin dönmüş olabilir:", rawAiText);
            }
        }

        // BİLİŞSEL REFLEKS
        function handleMoodShift(statusStr) {
            try {
                const status = JSON.parse(statusStr);
                if (status.type === "MOOD_SHIFT" && (Math.abs(status.arousal_shift) > 0.4 || status.new_mood === 'angry')) {
                    const card = document.createElement('div');
                    card.className = 'memory-card importance-5'; 
                    card.style.background = 'rgba(239, 68, 68, 0.05)';
                    card.innerHTML = `
                        <div class="card-header">
                            <span>🚨 BİLİŞSEL REFLEKS</span>
                            <span>ANOMALİ</span>
                        </div>
                        <div class="card-body" style="color:#fca5a5;">
                            Ruh hali aniden <b>${status.new_mood.toUpperCase()}</b> moduna geçti. Sistem uyarıldı.
                        </div>
                    `;
                    grid.prepend(card);
                }
            } catch (e) {}
        }

        micBtn.onclick = toggleMode;
    </script>
</body>
</html>
