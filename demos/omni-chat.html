<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Chat | Sentiric OS</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: white;}
        .back-link { position: absolute; top: 1rem; left: 1rem; text-decoration: none; color: #38bdf8; font-weight: 600; z-index: 10;}
        .chat-container { width: 100%; max-width: 600px; height: 90vh; background: #1e293b; border-radius: 1rem; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);}
        .chat-header { background: #0f172a; padding: 1rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; letter-spacing: 1px;}
        .chat-box { flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        .bubble { max-width: 80%; padding: 0.8rem 1rem; border-radius: 1rem; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word;}
        .bubble.ai { background: #334155; align-self: flex-start; border-bottom-left-radius: 0.2rem;}
        .bubble.user { background: #3b82f6; align-self: flex-end; border-bottom-right-radius: 0.2rem;}
        .chat-input { display: flex; padding: 1rem; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); gap: 0.5rem;}
        .chat-input input { flex: 1; padding: 0.8rem; border-radius: 0.5rem; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; font-size: 1rem;}
        .chat-input button { padding: 0.8rem 1.5rem; border-radius: 0.5rem; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .chat-input button:hover { background: #2563eb; }
        .typing { font-size: 0.8rem; color: #94a3b8; align-self: flex-start; display: none;}
    </style>
  <script type="module" crossorigin src="../omnichat.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/modulepreload-polyfill-CNgwewHt.js">
  <link rel="modulepreload" crossorigin href="../stream-sdk.js">
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Vitrine Dön</a>
    
    <div class="chat-container">
        <div class="chat-header">💬 SENTIRIC OMNI-CHAT</div>
        <div class="chat-box" id="chatBox">
            <div class="bubble ai">Merhaba! Ben Sentiric Omni-Chat asistanıyım. Size nasıl yardımcı olabilirim?</div>
            <div class="typing" id="typingIndicator">Yapay Zeka yazıyor...</div>
        </div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Mesajınızı yazın..." autocomplete="off">
            <button id="sendBtn">Gönder</button>
        </div>
    </div>

</body>
</html>
